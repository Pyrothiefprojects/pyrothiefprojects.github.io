<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Dancing Moose Gifts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            min-height: 100vh;
            background-image: url('dancingmoose.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            z-index: 0;
        }

        /* Navigation */
        nav {
            position: relative;
            z-index: 10;
            background: rgba(44, 24, 16, 0.9);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .nav-links {
            display: flex;
            list-style: none;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links a {
            color: #f5f0eb;
            text-decoration: none;
            padding: 0.6rem 1rem;
            display: block;
            font-size: 0.95rem;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #d4a574;
        }

        .nav-social {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-right: auto;
        }

        .nav-social a {
            color: #f5f0eb;
            text-decoration: none;
            transition: color 0.3s;
        }

        .nav-social a:hover {
            color: #d4a574;
        }

        .nav-social svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            vertical-align: middle;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background: #f5f0eb;
            margin: 5px 0;
            transition: 0.3s;
        }

        /* Main content */
        .content {
            position: relative;
            z-index: 1;
        }

        section {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
            text-align: center;
        }

        section h2 {
            font-size: 2rem;
            color: #2c1810;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        section p {
            font-size: 1rem;
            line-height: 1.8;
            color: #3d2a1c;
            margin-bottom: 1rem;
            text-align: center;
        }

        section {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 8px;
            margin-top: 40vh;
        }

        /* Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            background: rgba(44, 24, 16, 0.9);
            color: #a89880;
            text-align: center;
            padding: 0.8rem;
            font-size: 0.85rem;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }

            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(44, 24, 16, 0.95);
                padding-bottom: 1rem;
            }

            .nav-menu.active {
                display: flex;
            }

            .nav-links {
                flex-direction: column;
                gap: 0;
            }

            .nav-links a {
                padding: 0.8rem 2rem;
            }

            .nav-social {
                border-left: none;
                margin-left: 0;
                padding: 0.8rem 2rem;
                border-top: 1px solid rgba(245, 240, 235, 0.2);
            }
        }
    </style>
</head>
